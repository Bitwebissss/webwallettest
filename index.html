<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<!-- Font Awesome 7.0.1 -->
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
		      crossorigin="anonymous">
		<!-- Bootstrap 5.3.8 -->
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css"
		      crossorigin="anonymous">

		<link rel="icon" type="image/png" href="images/logo.png">
		<link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">

		<!-- jQuery 3.7.1 -->
		<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
		        crossorigin="anonymous"></script>
		<!-- js-sha256 0.11.1 -->
		<script src="https://cdnjs.cloudflare.com/ajax/libs/js-sha256/0.11.1/sha256.min.js"
		        crossorigin="anonymous"></script>
		<!-- Bootstrap 5.3.8 bundle (includes Popper.js — standalone Popper removed) -->
		<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.bundle.min.js"
		        crossorigin="anonymous"></script>
		<!-- qrcode 1.5.4 (soldair) — direct canvas render, no img conversion, cross-platform -->
		<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"
		        crossorigin="anonymous"></script>
		<!-- jsQR 1.4.0 — QR scanner (read), no newer version upstream, ISO standard stable -->
		<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"
		        crossorigin="anonymous"></script>
		<!-- jQuery shim: $(el).qrcode(text) → QRCode.toCanvas(canvas, text) direct render -->
		<script>
			$.fn.qrcode = function(opts) {
				var text = (typeof opts === 'string') ? opts : opts.text;
				return this.each(function() {
					var container = this;
					var canvas = document.createElement('canvas');
					container.appendChild(canvas);
					QRCode.toCanvas(canvas, text, { width: 256, margin: 2, color: { dark: '#000000', light: '#ffffff' } }, function(err) {
						if (err) console.error('QR render error:', err);
					});
				});
			};
		</script>
		<script src="multilang.js"></script>
		<script src="js/bitcoin-bundle-v7.min.js"></script>

		<style>
			html { height: 100%; }
			html, body { min-height: 100%; }
			body {
				font-family: 'Source Sans Pro', sans-serif;
				padding-top: 75px;
				padding-bottom: 56px;
				position: relative;
			}
			#logo { max-width: 30px; max-height: 30px; margin-top: -5px; margin-right: 5px; }
			.b-width { min-width: 100px; }
			.navbar-dark .navbar-nav .nav-link.active { color: rgba(255,255,255,.75); }
			.router-page { display: none; }
			.c-pointer { cursor: pointer; }
			.disabled { pointer-events: none; }
			.break-lines {
				-ms-word-break: break-all;
				word-break: break-all;
				word-break: break-word;
				-webkit-hyphens: auto;
				-moz-hyphens: auto;
				-ms-hyphens: auto;
				hyphens: auto;
			}
			.qr-code {
				display: flex;
				justify-content: center;
				margin-bottom: 8px;
			}
			.qr-code canvas, .qr-code img { max-width: 100%; display: block; }
			.wallet-balance { font-size: 23px; }
			.wallet-balance .font-monospace { font-size: 20px; }
			@media (max-width: 991.98px) {
				.navbar-expand-lg>.container, .navbar-expand-lg>.container-fluid {
					padding-right: 15px;
					padding-left: 15px;
				}
			}
			.balance-small { font-size: 15px; }
			.send-balance-fix { padding: 0px 0px 8px 0px; display: inline-block; }
			.break-word { word-wrap: break-word; }
			.wallet-unconfirmed { font-size: 13px; display: block; margin-top: 2px; }
			.history-item { font-size: 13px; padding: 6px 0; }
			.history-item:last-child { border-bottom: none !important; }
			#history-list { max-height: 320px; overflow-y: auto; }
			.pin-login-card .card-body { padding: 1.5rem; }
			.pin-login-title { font-size: 15px; color: #495057; margin-bottom: 12px; text-align: center; }
		</style>
		<title>Wallet</title>
		<meta name="description" content="Bitweb Web Wallet">
	</head>
	<body>
		<!-- Navbar -->
		<nav class="navbar fixed-top navbar-expand-lg navbar-dark bg-dark">
			<div class="container">
				<a href="#" class="navbar-brand"></a>
				<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
					<span class="navbar-toggler-icon"></span>
				</button>
				<div class="collapse navbar-collapse" id="navbarResponsive">
					<ul class="navbar-nav ms-auto">
						<li class="nav-item">
							<a href="#" class="nav-link router-link me-md-2" data-route="homepage" tkey="home"></a>
						</li>
						<li class="nav-item">
							<a href="#/broadcast" class="nav-link router-link me-md-2" data-route="broadcast" tkey="broadcast"></a>
						</li>
						<li class="nav-item">
							<a href="#/settings" class="nav-link router-link me-md-2" data-route="settings" tkey="settings"></a>
						</li>
						<li class="nav-item dropdown" id="network-list">
							<a class="nav-item nav-link dropdown-toggle" href="#" id="network-versions" data-bs-toggle="dropdown">NETWORK</a>
							<div class="dropdown-menu dropdown-menu-end" aria-labelledby="network-versions"></div>
						</li>
					</ul>
				</div>
			</div>
		</nav>

		<div class="container">
			<div id="error-message" class="alert alert-warning d-none" role="alert">
				Error, yay ∠( ᐛ 」∠)
			</div>
		</div>

		<!-- Home page -->
		<div id="homepage" class="router-page">
			<div class="container">
				<!-- PIN login (shown instead of open-block when wallet is saved) -->
				<div id="pin-login-block" class="d-none">
					<div class="card mb-3 pin-login-card">
						<div class="card-body">
							<p class="pin-login-title"><span class="fa-solid fa-lock"></span> <span tkey="pin-login-title">Saved wallet found</span></p>
							<div class="input-group mb-2">
								<input id="pin-login-input" type="password" class="form-control" tkey="pin-login-placeholder" placeholder="Enter PIN to open" maxlength="16" autocomplete="current-password">
																	<button id="pin-login-btn" class="btn btn-primary b-width" tkey="pin-login-btn">Open</button>
							</div>
							<div id="pin-login-error" class="text-danger small mb-2 d-none" tkey="pin-login-error">Wrong PIN, try again.</div>
							<div class="text-center">
								<a href="#" id="pin-login-manual" class="text-muted small" tkey="pin-login-manual">Enter credentials manually</a>
								<span class="text-muted small mx-2">·</span>
								<a href="#" id="pin-login-forget" class="text-muted small" tkey="pin-login-forget">Forget saved wallet</a>
							</div>
						</div>
					</div>
				</div>

				<div id="open-block">
					<div class="card mb-3">
						<div class="card-header">
							<ul class="nav nav-tabs card-header-tabs">
								<li class="nav-item me-2">
									<a class="nav-link tab-link active" data-tab-name="open-regular" data-tab-family="open-block" href="#" tkey="open-regular"></a>
								</li>
								<li class="nav-item">
									<a class="nav-link tab-link" data-tab-name="open-key" data-tab-family="open-block" href="#" tkey="open-key"></a>
								</li>
							</ul>
						</div>
						<div class="card-body">
							<form id="open-regular-form" class="open-form tab-item" data-tab="open-regular">
								<div class="input-group pb-2">
									<input id="open-email" name="open-email" class="form-control" type="text" placeholder="Email or other text (min 3 chars)">
								</div>
								<div class="input-group">
									<input id="open-password" name="open-password" class="form-control" type="password" tkey="password">
									<input id="open-password-confirm" name="open-password-confirm" class="form-control" type="password" tkey="password-confirm">
																			<button class="btn btn-outline-dark b-width" type="submit" id="open-regular-wallet" tkey="open"></button>
								</div>
							</form>
							<form id="open-key-form" class="open-form tab-item d-none" data-tab="open-key">
								<div class="input-group">
									<input id="passphrase" name="passphrase" class="form-control" type="password" tkey="wif-key">
																			<button class="btn btn-outline-dark b-width" type="submit" id="open-key-wallet" tkey="open"></button>
								</div>
							</form>
						</div>
						<div class="card-footer">
							<div class="footer-item tab-item" data-tab="open-regular" tkey="open-reminder"></div>
							<div class="footer-item tab-item d-none" data-tab="open-key">
								<span tkey="generate-question"></span> <span tkey="generate-it"></span>
							</div>

						</div>
					</div>
				</div>

				<div id="wallet-block" class="d-none">
					<div class="card mb-3">
						<div class="card-header">
							<ul class="nav nav-tabs card-header-tabs">
								<li class="nav-item me-2">
									<a class="nav-link tab-link active" data-tab-name="wallet-balance" data-tab-family="wallet-block" href="#" tkey="wallet"></a>
								</li>
								<li class="nav-item me-2">
									<a class="nav-link tab-link" data-tab-name="wallet-send" data-tab-family="wallet-block" href="#" tkey="send"></a>
								</li>
								<li class="nav-item me-2">
									<a id="history-tab-link" class="nav-link tab-link" data-tab-name="wallet-history" data-tab-family="wallet-block" href="#" tkey="history"></a>
								</li>
								<li class="nav-item">
									<a class="nav-link tab-link" data-tab-name="wallet-keys" data-tab-family="wallet-block" href="#" tkey="keys"></a>
								</li>
							</ul>
						</div>
						<div class="card-body">
							<div class="text-center">
								<div class="tab-item" data-tab="wallet-balance">
									<div id="qr-code-addres" class="qr-code"></div>
									<div class="d-inline-flex align-items-center justify-content-center" style="gap:5px;max-width:100%">
										<div id="wallet-address" class="break-word" style="font-size:13px;word-break:break-all"></div>
										<button id="copy-address-btn" class="btn btn-sm btn-outline-secondary flex-shrink-0" data-tkey-title="copy-address" title="Copy address" style="padding:1px 7px;font-size:12px;line-height:1.6">
											<span class="fa-solid fa-copy" id="copy-address-icon"></span>
										</button>
									</div>
									<div class="wallet-balance mb-0 pb-0 c-pointer">
										<span class="font-monospace amount"></span>
										<span class="ticker" tkey="loading"></span>
									</div>
									<small class="wallet-unconfirmed text-warning d-none"></small>
									<!-- Immature coinbase balance (shown only when > 0) -->
									<div id="immature-balance-row-main" class="d-none mt-1">
										<small class="text-warning">
											<span class="fa-solid fa-lock"></span>
											<span tkey="immature-mining">Immature (mining):</span> <b class="immature-amount"></b>
											<span class="text-muted"> — <span tkey="immature-cannot-spend">cannot spend yet</span></span>
										</small>
									</div>
								</div>
							</div>

							<div id="wallet-send" class="tab-item d-none" data-tab="wallet-send">
								<div class="mb-2">
									<span>
										<span tkey="available-balance"></span>
										<b class="wallet-balance balance-small c-pointer">
											<span class="amount"></span>
											<span class="ticker" tkey="loading"></span>
										</b>
									</span>
									<!-- Immature coinbase balance row -->
									<div id="immature-balance-row" class="d-none mt-1">
										<span class="text-warning" style="font-size:12px">
											<span class="fa-solid fa-lock"></span>
											<span tkey="immature-mining">Immature (mining):</span>
											<b class="immature-amount"></b>
										</span>
									</div>
									<div class="float-md-end">
										<a href="#" id="send-qr" class="text-dark pe-1">
											<span tkey="scan-qr"></span>
											<span class="fa-solid fa-camera"></span>
										</a>
										<a href="#" id="send-reset" class="text-dark">
											<span tkey="reset"></span>
											<span class="fa-solid fa-rotate"></span>
										</a>
									</div>
								</div>

								<div id="send-outputs">
									<div class="input-group send-outputs-item mb-2">
										<input name="send-address" class="form-control" type="text" value="" tkey="enter-address">
										<input name="send-ammount" class="form-control" type="text" value="" tkey="amount">
																					<button id="add-output" class="btn btn-outline-dark">
												<span class="fa-solid fa-plus"></span>
											</button>
									</div>
								</div>

								<div class="input-group">
									<input id="send-fee" class="form-control" placeholder="Fee" type="text" value="">
																			<button class="btn btn-outline-dark b-width" type="submit" id="send-tx" tkey="send"></button>
								</div>

								<!-- Coin Control (collapsible) -->
								<div class="mt-2">
									<a href="#" id="coin-control-toggle" class="text-muted small" style="text-decoration:none">
										<span class="fa-solid fa-sliders"></span>
										<span id="coin-control-toggle-text" tkey="coin-control">Coin Control</span>
									</a>
								</div>
								<div id="coin-control-panel" class="d-none mt-2 border rounded p-2" style="font-size:12px">
									<div class="d-flex justify-content-between align-items-center mb-2">
										<div>
											<input type="checkbox" id="coin-control-enable">
											<label for="coin-control-enable" class="mb-0 ms-1" tkey="coin-control-manual">Manual UTXO selection</label>
										</div>
										<a href="#" id="coin-control-select-all" class="text-primary small" tkey="coin-control-select-all">Select all mature</a>
									</div>
									<div id="coin-control-list" class="table-responsive" style="max-height:200px;overflow-y:auto">
										<table class="table table-sm table-borderless mb-0" id="coin-control-table">
											<thead class="table-light">
												<tr>
													<th style="width:28px"></th>
													<th tkey="amount">Amount</th>
													<th tkey="coin-control-confs">Confs</th>
													<th tkey="coin-control-type">Type</th>
													<th tkey="coin-control-status">Status</th>
												</tr>
											</thead>
											<tbody id="coin-control-tbody"></tbody>
										</table>
									</div>
									<div id="coin-control-selected-info" class="mt-1 text-muted"></div>
								</div>
							</div>

							<div class="tab-item d-none" data-tab="wallet-keys">
								<div id="wallet-keys">
									<div id="wallet-keys-pubkey">
										<label tkey="public-key"></label>
										<div class="input-group pb-2">
											<input class="form-control" readonly type="text">
										</div>
									</div>
									<div id="wallet-keys-privkey">
										<label tkey="private-key"></label>
										<div class="d-flex align-items-center pb-2" style="gap:4px">
											<canvas id="wallet-privkey-canvas" class="form-control p-1" style="height:38px;cursor:default;flex:1 1 auto" height="38"></canvas>
											<button id="wallet-privkey-copy-btn" class="btn btn-outline-secondary flex-shrink-0 d-none" type="button" title="Copy"><span class="fa-solid fa-copy"></span></button>
											<button id="toggle-wallet-privkey" class="btn btn-outline-dark flex-shrink-0 b-width" type="button" tkey="show"></button>
										</div>
									</div>
									<div id="wallet-keys-script">
										<label tkey="redeem-script">Redeem Script <i>(SegWit)</i></label>
										<div class="input-group pb-2">
											<input class="form-control" readonly type="text">
										</div>
									</div>
								</div>
							</div>
							<div class="tab-item d-none" data-tab="wallet-history">
								<div id="history-list">
									<div class="text-muted text-center py-3 small" tkey="history-loading">Loading history…</div>
								</div>
							</div>
						</div>
						<div class="card-footer">
							<button id="footer-close" type="button" class="btn btn-danger w-100 footer-item" tkey="close"></button>
						</div>
					</div>
				</div>
			</div>
		</div>

		<!-- Broadcast transaction -->
		<div id="broadcast" class="router-page">
			<div class="container">
				<div class="card mb-3">
					<div class="card-header">
						<b tkey="broadcast-transaction"></b>
					</div>
					<div class="card-body">
						<textarea class="form-control" id="transaction-broadcast-raw" rows="4" tkey="enter-transaction"></textarea>
					</div>
					<div class="card-footer">
						<button id="footer-broadcast" type="button" class="btn btn-primary w-100 footer-item" tkey="broadcast"></button>
					</div>
				</div>
			</div>
		</div>

		<!-- Settings -->
		<div id="settings" class="router-page">
			<div class="container">
				<div class="card mb-3">
					<div class="card-header">
						<b tkey="wallet-settings"></b>
					</div>
					<div class="card-body">
						<div id="address-type-select">
							<label tkey="address-type"></label>
							<div class="input-group pb-2">
								<select class="form-select">
									<option>bech32</option>
									<option>segwit</option>
									<option>legacy</option>
								</select>
							</div>
						</div>
						<div id="wallet-backend">
							<label tkey="wallet-backend"></label>
							<div class="input-group pb-2">
								<input class="form-control" type="text" tkey="wallet-api">
																	<button class="btn btn-outline-dark b-width" type="button" tkey="update"></button>
							</div>
						</div>
						<div id="wallet-language-select">
							<label tkey="wallet-language"></label>
							<div class="input-group pb-2">
								<select class="form-select"></select>
							</div>
						</div>
						<div id="forget-wallet-section" class="d-none">
							<label tkey="saved-wallet-label">Saved wallet</label>
							<div class="input-group">
								<button id="settings-forget-wallet" class="btn btn-outline-danger" tkey="settings-forget-wallet">
									Forget saved wallet
								</button>
							</div>
						</div>
					</div>
					<div class="card-footer">
						<span tkey="version"></span> <b id="wallet-version"></b>
					</div>
				</div>
			</div>
		</div>

		<!-- Send modal -->
		<div id="send-modal" class="modal" tabindex="-1" role="dialog">
			<div class="modal-dialog modal-md" role="document">
				<div class="modal-content">
					<div class="modal-header">
						<h5 id="send-title" class="modal-title"></h5>
						<button id="send-close" type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
					</div>
					<div class="modal-body">
						<div id="send-modal-error" class="alert alert-danger d-none" role="alert"></div>
						<div id="confirm-screen">
							<span tkey="send-warning"></span> <strong id="confirm-amount"></strong>. <span tkey="send-warning-reverse"></span>
						</div>
						<div id="status-screen" class="break-lines d-none">
							<span></span>
							<div class="extra-info"></div>
						</div>
					</div>
					<div class="modal-footer">
						<button id="send-cancel" type="button" class="btn me-auto btn-dark" data-bs-dismiss="modal" tkey="cancel"></button>
						<button id="send-confirm" type="button" class="btn mt-0 me-auto btn-primary" tkey="send-it"></button>
						<button id="send-close-footer" type="button" class="btn mt-0 me-auto btn-dark d-none disabled" data-bs-dismiss="modal" tkey="close"></button>
					</div>
				</div>
			</div>
		</div>

		<!-- Scan modal -->
		<div id="scan-modal" class="modal" tabindex="-1" role="dialog">
			<div class="modal-dialog modal-md" role="document">
				<div class="modal-content">
					<div class="modal-header">
						<h5 class="modal-title" tkey="scan-modal-title"></h5>
						<button id="scan-close" type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
					</div>
					<div class="modal-body">
						<div id="loading-message"></div>
						<canvas id="scan-canvas" hidden class="w-100"></canvas>
					</div>
				</div>
			</div>
		</div>

		<!-- PIN modal -->
		<div id="pin-modal" class="modal" tabindex="-1" role="dialog">
			<div class="modal-dialog modal-sm" role="document">
				<div class="modal-content">
					<div class="modal-header">
						<h5 id="pin-modal-title" class="modal-title" tkey="pin-title-default">Wallet PIN</h5>
					</div>
					<div class="modal-body">
						<p id="pin-modal-desc" class="text-muted small"></p>
						<input id="pin-input" type="password" class="form-control" tkey="pin-input-placeholder" placeholder="PIN (min 6 digits)" maxlength="32">
						<div id="pin-error" class="text-danger small mt-1 d-none" tkey="pin-login-error">Wrong PIN, try again.</div>
					</div>
					<div class="modal-footer">
						<button id="pin-cancel" type="button" class="btn btn-secondary" data-bs-dismiss="modal" tkey="cancel">Cancel</button>
						<button id="pin-confirm" type="button" class="btn btn-primary" tkey="ok">OK</button>
					</div>
				</div>
			</div>
		</div>

		<div class="disclaimer mb-3">
			<div class="container text-center">
				<small class="text-muted" style="max-width: 1100px;" tkey="disclaimer"></small>
			</div>
		</div>

		<footer class="mb-3">
			<div class="container text-center">
				<span class="fa-brands fa-github"></span> <a target="_blank" rel="noopener noreferrer" href="https://github.com/bitweb-project/web-wallet">Bitweb</a>

		<script>
			// ================================================================
			// Settings storage — localStorage (replaces cookies for all settings)
			// Keys: bte_cfg_{name}  — isolated from wallet data keys (bte_wallet_*, bte_utxo_*, bte_history_*)
			// ================================================================
			var CFG_PREFIX = 'bte_cfg_'

			// Validate backend URL before storing:
			//   - must be absolute http(s) URL
			//   - no embedded credentials (user:pass@host)
			//   - rejects javascript:, data:, blob:, etc.
			//   - http allowed only for localhost (dev)
			function isValidBackendUrl(url) {
				try {
					var u = new URL(url)
					if (u.protocol !== 'https:' &&
						!(u.protocol === 'http:' && (u.hostname === 'localhost' || u.hostname === '127.0.0.1'))) return false
					if (u.username || u.password) return false
					return true
				} catch(e) { return false }
			}

			function _cfgSet(key, value) {
				try { localStorage.setItem(CFG_PREFIX + key, String(value)) } catch(e) {}
			}
			function _cfgGet(key) {
				try { return localStorage.getItem(CFG_PREFIX + key) } catch(e) { return null }
			}
			function _cfgDel(key) {
				try { localStorage.removeItem(CFG_PREFIX + key) } catch(e) {}
			}

			// Public API — same signatures as the old cookie helpers so nothing else needs to change
			function setCookie(name, value, _days) {
				if (name === 'backend' && !isValidBackendUrl(value)) return  // reject invalid backend URLs
				_cfgSet(name, value)
			}
			function readCookie(name) {
				return _cfgGet(name)
			}
			function deleteCookie(name) {
				_cfgDel(name)
			}

			// ================================================================
			// Utility: HTML entity escaping (XSS prevention)
			// ================================================================
			function escHtml(s) {
				if (s == null) return ''
				return String(s)
					.replace(/&/g, '&amp;')
					.replace(/</g, '&lt;')
					.replace(/>/g, '&gt;')
					.replace(/"/g, '&quot;')
					.replace(/'/g, '&#039;')
			}

			// ================================================================
			// Canvas private key display — WIF never goes into input.value

			// Draw masked dots on a canvas (initial/hidden state)
			function _privkeyMask(canvasId) {
				var canvas = document.getElementById(canvasId)
				if (!canvas) return
				var w = canvas.parentElement ? canvas.parentElement.offsetWidth - 120 : 300
				if (w < 100) w = 300
				canvas.width = w
				var ctx = canvas.getContext('2d')
				ctx.clearRect(0, 0, canvas.width, canvas.height)
				ctx.fillStyle = '#aaa'
				ctx.font = '20px sans-serif'
				ctx.textBaseline = 'middle'
				ctx.fillText('● ● ● ● ● ● ● ● ● ● ● ●', 8, canvas.height / 2)
			}

			// Draw actual WIF text on canvas (revealed state)
			function _privkeyReveal(canvasId, wif) {
				var canvas = document.getElementById(canvasId)
				if (!canvas) return
				var w = canvas.parentElement ? canvas.parentElement.offsetWidth - 120 : 300
				if (w < 100) w = 300

				ctx.clearRect(0, 0, canvas.width, canvas.height)

				ctx.textBaseline = 'middle'

			// Wipe canvas completely (on close / navigation away)
			function _privkeyClear(canvasId) {

			// ================================================================
			// Encrypted storage (WebCrypto AES-GCM + PBKDF2)

			// ================================================================
			// Auto-lock: closes wallet after 20 min of inactivity.

			// PIN login appears automatically (hasSavedWallet() is still true).
			// ================================================================
			var AUTO_LOCK_MS   = 20 * 60 * 1000   // 20 minutes
			var _autoLockTimer = null

			function _resetAutoLock() {
				// Only tick when wallet is open (ECPair has privateKey buffer)
				if (!globalData.keys || !globalData.keys.privateKey) return
				clearTimeout(_autoLockTimer)

			async function deriveKey(pin, salt) {
				var enc = new TextEncoder()
				var km  = await crypto.subtle.importKey(
					'raw', enc.encode(pin), { name: 'PBKDF2' }, false, ['deriveKey']
				)
				return crypto.subtle.deriveKey(
					{ name: 'PBKDF2', salt: salt, iterations: 200000, hash: 'SHA-256' },
					km,
					{ name: 'AES-GCM', length: 256 },
					false,
					['encrypt', 'decrypt']
				)
			}

			// Save WIF key encrypted by PIN.
			// Stores the private key directly — no need to re-derive from identity+password every open.
			async function saveWif(wif, pin) {
				var enc     = new TextEncoder()
				var salt    = crypto.getRandomValues(new Uint8Array(16))
				var iv      = crypto.getRandomValues(new Uint8Array(12))
				var key     = await deriveKey(pin, salt)
				var payload = JSON.stringify({ type: 'wif', wif: wif })
				var ct      = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: iv }, key, enc.encode(payload))
				localStorage.setItem(STORAGE_KEY, JSON.stringify({
					salt: Array.from(salt),
					iv:   Array.from(iv),
					data: Array.from(new Uint8Array(ct))
				}))
				localStorage.setItem(EXIST_KEY, '1')
			}

			// Load credentials by PIN — returns {type, identity, password} or null
			async function loadCredentials(pin) {
				var raw = localStorage.getItem(STORAGE_KEY)
				if (!raw) return null
				var blob = JSON.parse(raw)
				var key  = await deriveKey(pin, new Uint8Array(blob.salt))
				try {
					var pt = await crypto.subtle.decrypt(
						{ name: 'AES-GCM', iv: new Uint8Array(blob.iv) },
						key,
						new Uint8Array(blob.data)
					)
					return JSON.parse(new TextDecoder().decode(pt))
				} catch(e) {
					return null   // wrong PIN
				}
			}

			// Reconstruct key from saved blob and open wallet (no PIN save re-offer)
			// Handles both new format {type:'wif'} and legacy {type:'credentials'}
			function openFromCredentials(creds) {
				if (!creds) return false
				try {
					if (creds.type === 'wif') {
						// New format: WIF stored directly — fast path, no re-derivation
						globalData.keys = bitcoin.ECPair.fromWIF(creds.wif, getConfig()['network'])
					} else if (creds.type === 'credentials') {
						// Legacy format: re-derive key from identity+password hash chain
						var identity = creds.identity
						var pass     = creds.password
						var s = identity
						s += '|' + pass + '|'
						s += s.length + '|!@' + ((pass.length * 7) + identity.length) * 7
						var regchars   = (pass.match(/[a-z]+/g)) ? pass.match(/[a-z]+/g).length   : 1
						var regupchars = (pass.match(/[A-Z]+/g)) ? pass.match(/[A-Z]+/g).length   : 1
						var regnums    = (pass.match(/[0-9]+/g)) ? pass.match(/[0-9]+/g).length   : 1
						s += ((regnums + regchars) + regupchars) * pass.length + '3571'
						s += (s + '' + s)
						for (var i = 0; i <= 51; i++) s = sha256.update(s).hex()
						globalData.keys = bitcoin.ECPair.fromPrivateKey(
							bitcoin.Buffer.from(s, 'hex'),
							{ 'network': getConfig()['network'] }
						)
					} else {
						return false
					}
				} catch(e) { return false }
				openWallet(globalData.keys, false)  // don't offer PIN save — already saved
				return true
			}

			function hasSavedWallet() {
				return localStorage.getItem(STORAGE_KEY) !== null
			}

			function forgetSavedWallet() {
				// Wipe ALL wallet data: encrypted blob, exist flag, history, utxo cache
				try {
					Object.keys(localStorage).forEach(function(k) {
						if (
							k === STORAGE_KEY ||
							k === EXIST_KEY   ||
							k.indexOf('bte_history_') === 0 ||
							k.indexOf('bte_utxo_')    === 0 ||
							k.indexOf('bte_wallet_')  === 0
						) localStorage.removeItem(k)
					})
				} catch(e) {}
				updateSavedWalletUI()
			}

			// Two-step mandatory PIN setup: enter then confirm. Returns confirmed PIN.

			async function askPinSetup() {

			// ================================================================
			// Copy to clipboard — works on HTTPS mobile + desktop
			// Falls back to execCommand for old browsers
			// ================================================================
			function copyToClipboard(text, $btn) {
				var doFeedback = function(ok) {
					var $icon = $btn.find('#copy-address-icon')
					$icon.removeClass('fa-copy').addClass(ok ? 'fa-check' : 'fa-times')
					$btn.addClass(ok ? 'btn-success' : 'btn-danger').removeClass('btn-outline-secondary')
					setTimeout(function() {
						$icon.removeClass('fa-check fa-times').addClass('fa-copy')
						$btn.removeClass('btn-success btn-danger').addClass('btn-outline-secondary')
					}, 1500)
				}
				if (navigator.clipboard && navigator.clipboard.writeText) {
					navigator.clipboard.writeText(text).then(function() {
						doFeedback(true)
					}).catch(function() {
						doFeedback(false)
					})
				} else {
					// Fallback: hidden textarea + execCommand
					var ta = document.createElement('textarea')
					ta.value = text
					ta.style.position = 'fixed'
					ta.style.opacity  = '0'
					document.body.appendChild(ta)
					ta.focus(); ta.select()
					var ok = false
					try { ok = document.execCommand('copy') } catch(e) {}
					document.body.removeChild(ta)
					doFeedback(ok)
				}
			}
			// ================================================================

			// Returns required depth (confirmations) for a coinbase UTXO to be spendable.
			// coinHeight = block height where the coinbase was mined
			// Uses maturity config from current network (parametrized — disable extended
			// for non-Bitweb networks by setting maturity.extended.enabled = false).
			function getRequiredMaturity(coinHeight) {
				var cfg = getConfig()['maturity']
				if (!cfg) return 100
				var m   = cfg.coinbase || 100
				var ext = cfg.extended
				if (ext && ext.enabled) {
					var EXT_END = ext.start + ext.depth
					if (coinHeight >= ext.start && coinHeight < EXT_END) {
						// Extended rule: required = (EXT_END - coinHeight) + COINBASE_MATURITY
						return (EXT_END - coinHeight) + m
					}
				}
				return m
			}

			// Returns true if a UTXO is mature (safe to spend).
			// utxo must have { coinbase: bool, height: int }
			// currentHeight = current blockchain tip
			function isUtxoMature(utxo, currentHeight) {
				if (!utxo.coinbase) return true
				if (utxo.height === 0) return false   // unconfirmed coinbase — never mature
				var depth    = currentHeight - utxo.height + 1
				var required = getRequiredMaturity(utxo.height)
				return depth >= required
			}

			// Blocks remaining until UTXO matures (0 if already mature)
			function blocksToMature(utxo, currentHeight) {
				if (!utxo.coinbase || utxo.height === 0) return 0
				var depth    = currentHeight - utxo.height + 1
				var required = getRequiredMaturity(utxo.height)
				return Math.max(0, required - depth)
			}

			// ================================================================
			// UTXO localStorage cache
			// Key: bte_utxo_{address}
			// Stored: { utxos: [...], height: N, ts: timestamp }
			// Invalidate when height changes or after 60s
			// ================================================================
			var UTXO_CACHE_TTL = 60000  // ms

			function loadUtxoCache(address) {
				try {
					var raw = localStorage.getItem('bte_utxo_' + address)
					if (!raw) return null
					var c = JSON.parse(raw)
					if (Date.now() - c.ts > UTXO_CACHE_TTL) return null
					return c
				} catch(e) { return null }
			}

			function saveUtxoCache(address, utxos, height) {
				try {
					localStorage.setItem('bte_utxo_' + address, JSON.stringify({
						utxos: utxos, height: height, ts: Date.now()
					}))
				} catch(e) {}
			}

			function clearUtxoCache(address) {
				try { localStorage.removeItem('bte_utxo_' + address) } catch(e) {}
			}

			// ================================================================

			// ================================================================
			function routePage() {
				var urlParams = readParams()
				if (window.location.hash == '') window.location.replace(window.location.href.split('#')[0] + '#/')
				if (urlParams[0] == '#') {
					var pageName    = urlParams[1] != '' ? urlParams[1] : 'homepage'
					var templateName = '#' + pageName
					$('.router-link').removeClass('active')
					$('.router-link[data-route=' + pageName + ']').addClass('active')
					if ($('.router-page:visible').attr('id') != urlParams[1]) {
						$('div.router-page').hide()
						if ($(templateName).length) $(templateName).show()
					}
					switch(pageName) {
						case 'homepage':  setHomeTitle(); break
							case 'broadcast': setTitle(getText('broadcast-transaction')); break
						case 'settings':  setTitle(getText('wallet-settings')); break
						case 'network':
							var network = urlParams[2]
							if (network != undefined) switchConfig(network)
							break
						default: switchPage(); break
					}
				}
			}

				url    = url    || ''
				params = params || []
				var p  = params.length > 0 ? '/' + params.join('/') : ''
				window.location.hash = '#/' + url + p

			// confirmedOnly=true — use only confirmed UTXOs
			function getUnspent(address, amount, confirmedOnly) {
				var url = getBackend() + '/unspent/' + address + '?amount=' + amount
				if (confirmedOnly) url += '&confirmed=true'
				return Promise.resolve($.ajax({ 'url': url }))
			}

			// Fetch UTXOs, compute maturity, cache in localStorage + globalData.
			// Calls renderCoinControl() and updates immature balance display.
			// forceRefresh=true bypasses TTL cache.
			function updateUtxos(forceRefresh) {
				if (!globalData.address) return Promise.resolve()

				var address = globalData.address
				var height  = globalData.height

				// Check cache unless forced
				if (!forceRefresh) {
					var cached = loadUtxoCache(address)
					if (cached && cached.height === height && height > 0) {
						globalData.utxos = cached.utxos
						_applyUtxoData()
						return Promise.resolve()
					}
				}

				return fetch(getBackend() + '/unspent/' + address + '?confirmed=true')
					.then(function(r) { return r.json() })
					.then(function(data) {
						if (!data || data.error !== null) return
						var utxos = data.result || []
						// Annotate each UTXO with mature flag and blocksLeft
						utxos.forEach(function(u) {
							u.mature     = isUtxoMature(u, height)
							u.blocksLeft = blocksToMature(u, height)
						})
						globalData.utxos = utxos
						saveUtxoCache(address, utxos, height)
						_applyUtxoData()
					})
					.catch(function() {})
			}

			// Compute + display immature balance, re-render coin control only if UTXOs changed
			function _applyUtxoData() {
				var immature = 0
				globalData.utxos.forEach(function(u) {
					if (!u.mature) immature += u.value
				})
				globalData.immatureBalance = immature

				// Fingerprint = sorted txid:index:mature list — skip coin control re-render if identical
				var fp = globalData.utxos.map(function(u) {
					return u.txid + ':' + u.index + ':' + (u.mature ? 1 : 0)
				}).join('|')

				var fpChanged = fp !== globalData._lastRendered.utxoFingerprint
				if (fpChanged) {
					globalData._lastRendered.utxoFingerprint = fp
					renderCoinControl()
				}

				_renderBalanceDisplay()
			}

			function amountFormat(amount, invert) {
				var decimals = getConfig()['decimals']
				if (!invert) return parseFloat((amount / Math.pow(10, decimals)).toFixed(decimals))

			}

			// ================================================================
			// Transaction history  (last 10 fetched client-side, direction computed from vout)
			// ================================================================
			var HISTORY_LIMIT = 10

			function loadHistory() {
				var key = 'bte_history_' + globalData.address
				try { return JSON.parse(localStorage.getItem(key) || '[]') } catch(e) { return [] }
			}

			function saveHistory(txs) {
				if (!globalData.address) return
				try { localStorage.setItem('bte_history_' + globalData.address, JSON.stringify(txs)) } catch(e) {}
			}

			// Annotate a tx using full verbose tx data (vin + vout)
			// Determines direction by looking for our pubkey in vin inputs:
			//   - bech32 (P2WPKH)    : txinwitness[1] = compressed pubkey
			//   - segwit (P2SH-P2WPKH): txinwitness[1] = compressed pubkey (same witness structure)
			//   - legacy (P2PKH)     : scriptSig.hex ends with "21" + pubkey (no witness)
			function annotateTx(txMeta, txDetail) {
				var vin  = txDetail.vin  || []
				var vout = txDetail.vout || []
				var myPub = (globalData.pubKeyHex || '').toLowerCase()

				var weAreSender = vin.some(function(input) {
					// bech32 and segwit: pubkey is txinwitness[1]
					var wit = input.txinwitness || []
					if (wit[1] && wit[1].toLowerCase() === myPub) return true

					// legacy P2PKH: scriptSig ends with OP_PUSHDATA(33) + pubkey = "21" + pubkey_hex
					var sig = (input.scriptSig && input.scriptSig.hex) ? input.scriptSig.hex.toLowerCase() : ''
					if (sig.length >= 68 && sig.slice(-68) === '21' + myPub) return true

					return false
				})

				// Sum vout: received = to us (any of our addresses), sentToOthers = to other addresses
				var received = 0, sentToOthers = 0
				vout.forEach(function(o) {
					var sat = (o.value_sat != null) ? o.value_sat : Math.round((o.value || 0) * 1e8)
					var hex = (o.scriptPubKey && o.scriptPubKey.hex) ? o.scriptPubKey.hex.toLowerCase() : ''
					// Primary: match by scriptPubKey hex against all our known scripts
					var isOurs = hex
						? (globalData.allScriptHexes
							? globalData.allScriptHexes.has(hex)
							: (hex === (globalData.scriptHex || '').toLowerCase()))
						: false
					// Fallback: match by address string — catches cases where ElectrumX
					// returns a different scriptPubKey structure or hex doesn't match
					if (!isOurs) {
						var outAddr = ''
						if (o.scriptPubKey) {
							outAddr = o.scriptPubKey.address
								|| (o.scriptPubKey.addresses && o.scriptPubKey.addresses[0])
								|| ''
						}
						if (outAddr) {
							isOurs = globalData.allAddresses
								? globalData.allAddresses.has(outAddr)
								: (outAddr === (globalData.address || ''))
						}
					}
					if (isOurs) {
						received += sat
					} else {
						sentToOthers += sat
					}
				})

				// direction + display amount
				// Note: fee = inputs_total - all_vout_total; it's not in any vout so it's
				// not included in sentToOthers. Display shows "sent X to recipient (+ fee)".
				var direction, amount, isSelfSend
				if (weAreSender) {
					isSelfSend = (sentToOthers === 0)
					direction  = isSelfSend ? 'self' : 'out'
					amount     = isSelfSend ? received : sentToOthers
				} else {
					direction = 'in'
					amount    = received
				}

				return {
					tx_hash:   txMeta.tx_hash,
					height:    txMeta.height,
					direction: direction,
					amount:    amount
				}
			}

			function updateHistory() {
				if (globalData.status !== 'unlocked') return

				$('#history-list').html('<div class="text-muted text-center py-3 small">' + escHtml(getText('history-loading')) + '</div>')

				// 1. Fetch full history list (lightweight — just hashes + heights)
				fetch(getBackend() + '/history/' + globalData.address)
				.then(function(r) { return r.json() })
				.then(function(data) {
					if (!data || data.error !== null) {
						$('#history-list').html('<div class="text-danger text-center py-3 small">' + escHtml(getText('history-failed')) + '</div>')
						return
					}
					var all    = data.result || []
					var total  = all.length
					// Take last HISTORY_LIMIT, reversed so newest first
					var recent = all.slice(-HISTORY_LIMIT).reverse()

					if (recent.length === 0) { renderHistory([], total); return }

					// 2. Fetch verbose details for each tx in parallel
					var fetches = recent.map(function(txMeta) {
						return fetch(getBackend() + '/tx/' + txMeta.tx_hash)
						.then(function(r) { return r.json() })
						.then(function(d) {
							var txDetail = (d.error === null && d.result) ? d.result : {}
							return annotateTx(txMeta, txDetail)
						})
						.catch(function() {
							// If /tx fetch fails, show row without amount
							return { tx_hash: txMeta.tx_hash, height: txMeta.height, direction: 'unknown', amount: null }
						})
					})

					Promise.all(fetches).then(function(annotated) {
						if (!globalData.address) return
						saveHistory(annotated)
						renderHistory(annotated, total)
					})
				})
				.catch(function() {
					$('#history-list').html('<div class="text-danger text-center py-3 small">' + escHtml(getText('history-network-error')) + '</div>')
				})
			}

			function renderHistory(txs, total) {
				if (!txs || txs.length === 0) {
					$('#history-list').html('<div class="text-muted text-center py-3 small">' + escHtml(getText('no-transactions')) + '</div>')
					return
				}

				var html = ''
				txs.forEach(function(tx) {
					var confirmed  = tx.height !== 0
					var confs      = confirmed
						? (globalData.height > 0 ? (globalData.height - tx.height + 1) + ' ' + getText('history-conf') : getText('history-confirmed'))
						: getText('history-pending')
					var confBadge  = confirmed
						? '<span class="badge text-bg-success ms-1">' + escHtml(confs) + '</span>'
						: '<span class="badge text-bg-warning ms-1">' + escHtml(getText('history-pending')) + '</span>'

					// Amount + direction label (left side, before txid)
					var dir    = tx.direction || 'unknown'
					var amt    = (tx.amount != null) ? amountFormat(tx.amount) : '?'
					var ticker = getConfig()['ticker']

					var dirLabel = ''
					if (dir === 'in') {
						dirLabel = '<span class="font-weight-bold text-success" style="min-width:110px;display:inline-block">&#x2193; +' + escHtml(String(amt)) + ' ' + escHtml(ticker) + '</span>'
					} else if (dir === 'out') {
						dirLabel = '<span class="font-weight-bold text-danger" style="min-width:110px;display:inline-block">&#x2191; -' + escHtml(String(amt)) + ' ' + escHtml(ticker) + '</span>'
					} else if (dir === 'self') {
						dirLabel = '<span class="font-weight-bold text-info" style="min-width:110px;display:inline-block">&#x21C5; ' + escHtml(String(amt)) + ' ' + escHtml(ticker) + '</span>'
					} else {
						dirLabel = '<span class="text-muted" style="min-width:110px;display:inline-block">— ? ' + escHtml(ticker) + '</span>'
					}

					var safeHash  = escHtml(tx.tx_hash || '')
					var txUrl     = escHtml(blockExplorer.tx(tx.tx_hash || ''))
					var shortHash = safeHash.substr(0, 10) + '…' + safeHash.substr(-6)

					html += '<div class="history-item d-flex align-items-center border-bottom" style="gap:6px">' +
						dirLabel +
						'<div class="font-monospace text-truncate flex-grow-1" style="font-size:11px">' +
							'<a href="' + txUrl + '" target="_blank" rel="noopener noreferrer">' + shortHash + '</a>' +
						'</div>' +
						'<div class="flex-shrink-0">' + confBadge + '</div>' +
					'</div>'
				})

				// "See more" link when history is longer than HISTORY_LIMIT
				if (total && total > HISTORY_LIMIT) {
					var explorerUrl = escHtml(blockExplorer.address(globalData.address))
					html += '<div class="text-center py-2"><small><a href="' + explorerUrl + '" target="_blank" rel="noopener noreferrer">' + escHtml(getText('history-view-all')) + ' ' + total + ' ' + escHtml(getText('history-on-explorer')) + ' &#x2197;</a></small></div>'
				}

				$('#history-list').html(html)
			}

			// ================================================================
			// Wallet balance — with confirmations and network height
			// silent=true: update in background without clearing displayed value (auto-refresh)
			// silent=false (default): show Loading state (first open / manual refresh)
			function walletBalance(silent) {
				if (globalData.status !== 'unlocked') return
				if (!silent) {
					$('.wallet-balance .amount').text('')
					$('.wallet-balance .ticker').text(getText('loading'))
					// Reset last rendered so next call forces DOM update
					globalData._lastRendered.balance  = -1
					globalData._lastRendered.immature = -1
				}

				Promise.all([
					$.ajax({ url: getBackend() + '/info' }),
					addressBalance(globalData.address)
				]).then(function(results) {
					var infoData    = results[0]
					var balanceData = results[1]

					var prevHeight  = globalData.height
					var prevBalance = globalData.balance

					if (infoData && infoData.result) {
						globalData.height = infoData.result.blocks
					}

					if (balanceData && balanceData.error == null) {
						globalData.balance = balanceData.result.balance

						// Balance changed → refresh history
						if (globalData.balance !== prevBalance && globalData.address) updateHistory()
					} else {
						if (!silent) showMessage(messages.error['balance-load-failed'])
					}

					// Render balance (available = balance - immature, already computed)
					_renderBalanceDisplay()

					// Refresh UTXOs when height changed or first load — they recompute immature
					// which triggers _renderBalanceDisplay again with correct immature value
					var heightChanged = globalData.height !== prevHeight
					if (heightChanged || globalData.utxos.length === 0) {
						updateUtxos(heightChanged)
					}
				}).catch(function() {
					if (!silent) {
						showMessage(messages.error['balance-load-failed'])
						$('.wallet-balance .ticker').text(getConfig()['ticker'])
					}
				})
			}

			// Render available + immature balances.
			// Skips DOM update entirely if nothing changed since last render.
			function _renderBalanceDisplay() {
				var total    = globalData.balance
				var immature = globalData.immatureBalance
				var avail    = Math.max(0, total - immature)

				// Skip if nothing changed
				var lr = globalData._lastRendered
				if (lr.balance === total && lr.immature === immature) return
				lr.balance = total
				lr.immature = immature

				var ticker = getConfig()['ticker']

				// Main balance shows AVAILABLE (spendable) amount
				$('.wallet-balance .amount').text(amountFormat(avail))
				$('.wallet-balance .ticker').text(ticker)

				// Immature row — both tabs — visible only when > 0
				var immatureText = immature > 0
					? amountFormat(immature) + ' ' + ticker
					: ''

				$('#immature-balance-row-main, #immature-balance-row').each(function() {
					if (immature > 0) {
						$(this).find('.immature-amount').text(immatureText)
						$(this).removeClass('d-none')
					} else {
						$(this).addClass('d-none')
					}
				})
			}

			function setHomeTitle() {
				if (globalData.keys != undefined) setTitle(getText('address') + ' ' + globalData.address)
				else setTitle(getText('open-wallet'))
			}

			function checkBalanceLoop() {
				clearTimeout(walletTimer)
				walletTimer = setTimeout(function() {
					if (globalData.status !== 'unlocked') return  // wallet locked or closed — stop loop
					if ($('.wallet-balance .ticker').text() != getText('loading')) walletBalance(true)
					checkBalanceLoop()
				}, 40000)
			}

			// ================================================================
			// Open wallet
			// ================================================================
			// Compute scriptPubKey hex for this address type — used to match vout in tx history
			function getScriptHex(keys) {
				var network = getConfig()['network']
				var type    = getAddressType()
				if (type === 'bech32') {
					return bitcoin.Buffer.from(getP2WPKHScript(keys.publicKey).output).toString('hex')
				} else if (type === 'segwit') {
					return bitcoin.Buffer.from(getP2SHScript(getP2WPKHScript(keys.publicKey)).output).toString('hex')
				} else {
					return bitcoin.Buffer.from(bitcoin.payments.p2pkh({ pubkey: keys.publicKey, network: network }).output).toString('hex')
				}
			}

			// Build a Set of ALL scriptPubKey hex strings for this key (bech32 + segwit + legacy).
			// One key produces three addresses — history may contain change outputs to any of them.
			function getAllScriptHexes(keys) {
				var network = getConfig()['network']
				var set = new Set()
				// P2WPKH (bech32)
				set.add(bitcoin.Buffer.from(getP2WPKHScript(keys.publicKey).output).toString('hex').toLowerCase())
				// P2SH-P2WPKH (segwit)
				set.add(bitcoin.Buffer.from(getP2SHScript(getP2WPKHScript(keys.publicKey)).output).toString('hex').toLowerCase())
				// P2PKH (legacy)
				set.add(bitcoin.Buffer.from(bitcoin.payments.p2pkh({ pubkey: keys.publicKey, network: network }).output).toString('hex').toLowerCase())
				return set
			}

			// Build a Set of ALL address strings for this key (bech32 + segwit + legacy).
			// Used as a reliable fallback when scriptPubKey.hex matching fails.
			function getAllAddresses(keys) {
				var network = getConfig()['network']
				var set = new Set()
				try { set.add(bitcoin.payments.p2wpkh({ pubkey: keys.publicKey, network: network }).address) } catch(e) {}
				try {
					var redeem = bitcoin.payments.p2wpkh({ pubkey: keys.publicKey, network: network })
					set.add(bitcoin.payments.p2sh({ redeem: redeem, network: network }).address)
				} catch(e) {}
				try { set.add(bitcoin.payments.p2pkh({ pubkey: keys.publicKey, network: network }).address) } catch(e) {}
				return set
			}

			// identity, password params removed — pass offerPin=true to trigger PIN save dialog
			// Show wallet UI and start balance polling. Called only AFTER PIN is collected.
			function _showWalletUI(keys) {
				var pubkey = globalData.pubKeyHex
				var redeem = '0014' + bitcoin.Buffer.from(getP2WPKHScript(keys.publicKey).hash).toString('hex')

				$('#wallet-keys-pubkey input').val(pubkey)
				// Private key: canvas masked, never in input.value
				_privkeyClear('wallet-privkey-canvas')
				_privkeyMask('wallet-privkey-canvas')
				$('#wallet-privkey-copy-btn').addClass('d-none')
				$('#toggle-wallet-privkey').text(getText('show'))
				$('#wallet-keys-script input').val(redeem)

				$('#wallet-address').text(globalData.address)
				$('#pin-login-block').addClass('d-none')
				$('#open-block').addClass('d-none')
				$('#wallet-block').removeClass('d-none')
				$('#send-fee').attr('placeholder', getText('fee') + ' (' + getText('recommended') + ' ' + globalData.rfee + ' ' + getConfig()['ticker'] + ')')
				showQrAddress(getConfig()['uri'] + globalData.address)

				renderHistory(loadHistory())
				walletBalance()
				checkBalanceLoop()
				setHomeTitle()
				_resetAutoLock()
			}

			// Open wallet: if offerPin && no saved wallet -> collect PIN first, then show UI.
			async function openWallet(keys, offerPin) {
				if (offerPin && !hasSavedWallet()) {
					var pin = await askPinSetup()
					if (pin === null) {
						// User cancelled — wipe key from memory, stay on open form
						globalData.keys = undefined
						return
					}
					await saveWif(keys.toWIF(), pin)
					showMessage(getText('wallet-saved'))
					updateSavedWalletUI()
				}

				// Only set runtime state after PIN is confirmed (or not required)
				globalData.status         = 'unlocked'
				globalData.address        = getAddress(keys)
				globalData.scriptHex      = getScriptHex(keys)
				globalData.pubKeyHex      = bitcoin.Buffer.from(keys.publicKey).toString('hex')
				globalData.allScriptHexes = getAllScriptHexes(keys)
				globalData.allAddresses   = getAllAddresses(keys)

				_showWalletUI(keys)
			}

			function closeWallet() {
				_stopAutoLock()
				clearTimeout(walletTimer)
				// Wipe private key canvas — forces GPU buffer release
				_privkeyClear('wallet-privkey-canvas')
				_privkeyMask('wallet-privkey-canvas')
				$('#wallet-privkey-copy-btn').addClass('d-none')
				$('#toggle-wallet-privkey').text(getText('show'))
				$('#wallet-keys-pubkey input').val('')
				$('#wallet-keys-script input').val('')
				$('#wallet-address').text('')
				$('#qr-code-addres').empty()
				resetTxForm()
				$('#wallet-block').addClass('d-none')
				$('.wallet-unconfirmed').addClass('d-none')
				globalData.clear()
				updateSavedWalletUI()
				setHomeTitle()
			}

			// ================================================================
			// Coin Control UI
			// ================================================================
			function renderCoinControl() {
				var utxos  = globalData.utxos
				var height = globalData.height
				var tbody  = $('#coin-control-tbody')
				tbody.empty()

				if (utxos.length === 0) {
					tbody.append('<tr><td colspan="5" class="text-muted text-center">' + escHtml(getText('coin-control-no-utxo')) + '</td></tr>')
					_updateCoinControlInfo()
					return
				}

				utxos.forEach(function(u, idx) {
					var key      = escHtml(u.txid + ':' + u.index)
					var checked  = !globalData.coinControl || (globalData.selectedUtxos && globalData.selectedUtxos.has(u.txid + ':' + u.index))
					var mature   = u.mature
					var isCbase  = u.coinbase
					var disabled = (!globalData.coinControl || !mature) ? 'disabled' : ''
					var rowClass = (!mature) ? 'text-muted' : ''
					var status   = ''
					if (!mature) {
						status = '<span class="text-warning" title="' + escHtml(getText('coin-control-matures-in')) + ' ' + escHtml(String(u.blocksLeft)) + ' ' + escHtml(getText('coin-control-blocks')) + '">' +
							'<span class="fa-solid fa-lock"></span> ' + escHtml(String(u.blocksLeft)) + ' blk</span>'
					} else {
						status = '<span class="text-success"><span class="fa-solid fa-unlock"></span> ' + escHtml(getText('coin-control-mature')) + '</span>'
					}
					var typeLabel = isCbase
						? '<span class="badge text-bg-secondary">' + escHtml(getText('coin-control-coinbase')) + '</span>'

						'<td><input type="checkbox" class="cc-utxo-check" data-key="' + key + '"' +
						(checked ? ' checked' : '') + (disabled ? ' disabled' : '') + (!mature ? ' title="' + escHtml(getText('coin-control-immature-title')) + '"' : '') + '></td>' +
						'<td class="font-monospace">' + escHtml(String(amt)) + '</td>' +
						'<td>' + (height > 0 && u.height > 0 ? escHtml(String(height - u.height + 1)) : '—') + '</td>' +
						'<td>' + typeLabel + '</td>' +

			function _updateCoinControlInfo() {
				if (!globalData.coinControl || !globalData.selectedUtxos) {
					$('#coin-control-selected-info').text('')

				}
				var total = 0, count = 0
				globalData.utxos.forEach(function(u) {
					var key = u.txid + ':' + u.index
					if (globalData.selectedUtxos.has(key)) { total += u.value; count++ }
				})

					count + ' ' + getText('coin-control-selected') + ' — ' + amountFormat(total) + ' ' + getConfig()['ticker']

			// ================================================================
			// Send transaction — spend only confirmed UTXOs
			// ================================================================
			function showConfirmation(amount) {
				$('#confirm-amount').text(amount + ' ' + getConfig()['ticker'])
				$('#send-modal-error').addClass('d-none').html('')
				$('#send-modal').modal('toggle')
				$('#send-title').text(messages.title['sure'])
				$('#send-cancel').removeClass('disabled d-none')
				$('#send-confirm').removeClass('disabled d-none')
				$('#send-close-footer').addClass('d-none disabled')
				$('#confirm-screen').removeClass('d-none')
				$('#status-screen').addClass('d-none')
				$('#status-screen span').html('')

				$.each($('#send-outputs .send-outputs-item'), function(key, item) {
					var address = $('[name="send-address"]', item).val().trim()
					var value   = $('[name="send-ammount"]', item).val() * 1
					globalData.tx.outputs.push({ 'address': address, 'amount': amountFormat(value, true) })
				})

				globalData.tx.amount = amountFormat(amount, true)
				globalData.tx.fee    = amountFormat(($('#send-fee').val() != '') ? $('#send-fee').val() : globalData.rfee, true)
			}

			// ================================================================
			// Fetch raw transaction hex from backend — needed for legacy P2PKH
			// inputs in Psbt. Backend must expose:
			//   GET /rawtx/{txid}  →  { result: "<rawhex>", error: null }
			// ================================================================
			function getRawTx(txid) {
				return fetch(getBackend() + '/rawtx/' + txid)
					.then(function(r) { return r.json() })
					.then(function(data) {
						if (data.error !== null) throw new Error('rawtx fetch failed')
						return data.result
					})
			}

			// ================================================================
			// Send transaction using Psbt (replaces legacy TransactionBuilder)
			// Supports bech32 (P2WPKH), segwit (P2SH-P2WPKH), legacy (P2PKH)
			// ================================================================
			function sendTransaction() {
				var network = getConfig()['network']
				var keys    = globalData.keys
				var outputs = globalData.tx.outputs
				var amount  = globalData.tx.amount
				var address = globalData.address

				var psbt = new bitcoin.Psbt({ network: network })
				psbt.setVersion(2)

				$('#send-cancel').addClass('disabled')
				$('#send-confirm').addClass('disabled')
				$('#confirm-screen').addClass('d-none')
				$('#status-screen').removeClass('d-none')
				$('#send-title').text(messages.title['processing'])
				$('#status-screen .extra-info').empty()
				$('#status-screen span').html(messages.tx['generating'])

				for (var i = 0; i < outputs.length; i++) {
					psbt.addOutput({ address: outputs[i].address, value: BigInt(outputs[i].amount) })
				}

				$('#status-screen span').html(messages.tx['loading-utxo'])

				// Use cached UTXOs (already filtered to confirmed) + refresh if empty
				var doSend = function(utxos) {
					// Filter: exclude immature coinbase; if coin control enabled, use selection
					var spendable
					if (globalData.coinControl && globalData.selectedUtxos && globalData.selectedUtxos.size > 0) {
						spendable = utxos.filter(function(u) {
							return globalData.selectedUtxos.has(u.txid + ':' + u.index) && u.mature
						})
					} else {
						// Default: skip immature coinbase automatically
						spendable = utxos.filter(function(u) { return u.mature })
					}

					var value     = 0
					var inputMeta = []  // per-input type metadata

					for (var i = 0; i < spendable.length; i++) {
						var u      = spendable[i]
						var script = bitcoin.Buffer.from(u.script, 'hex')
						var type   = getScriptType(script)

						if (type === 'bech32') {
							var p2wpkh = getP2WPKHScript(keys.publicKey)
							psbt.addInput({
								hash:        u.txid,
								index:       u.index,
								witnessUtxo: { script: p2wpkh.output, value: BigInt(u.value) }
							})
							inputMeta.push({ type: 'bech32' })

						} else if (type === 'segwit') {
							var p2wpkh2 = getP2WPKHScript(keys.publicKey)
							var p2sh2   = getP2SHScript(p2wpkh2)
							psbt.addInput({
								hash:         u.txid,
								index:        u.index,
								witnessUtxo:  { script: p2sh2.output, value: BigInt(u.value) },
								redeemScript: p2wpkh2.output
							})
							inputMeta.push({ type: 'segwit' })

						} else if (type === 'legacy') {
							// P2PKH: needs full raw previous tx (nonWitnessUtxo).
							// Placeholder input — raw tx added after fetch below.
							psbt.addInput({ hash: u.txid, index: u.index })
							inputMeta.push({ type: 'legacy', psbtIdx: inputMeta.length, txid: u.txid })

						} else {
							showSendError(messages.error['bad-utxo'])
							return
						}

						value += u.value
						if (value >= amount) break
					}

					if (value < amount) {
						showSendError(messages.error['not-enough-funds'])
						return
					}

					// Fetch raw txs for any legacy inputs, then sign + broadcast
					var legacyFetches = inputMeta
						.filter(function(m) { return m.type === 'legacy' })
						.map(function(m) {
							return getRawTx(m.txid).then(function(rawHex) {
								psbt.updateInput(m.psbtIdx, {
									nonWitnessUtxo: bitcoin.Buffer.from(rawHex, 'hex')
								})
							})
						})

					Promise.all(legacyFetches).then(function() {
						var change = value - amount
						if (change > 0) psbt.addOutput({ address: address, value: BigInt(change) })

						psbt.signAllInputs(keys)
						psbt.finalizeAllInputs()
						var tx = psbt.extractTransaction()

						transactionBroadcast(tx.toHex()).then(function(data) {
							if (data.error == null) {
								clearUtxoCache(address)  // invalidate UTXO cache after spend
								$('#status-screen span').html(
									'<a href="' + escHtml(blockExplorer.tx(data.result)) + '" target="_blank" rel="noopener noreferrer">' + escHtml(data.result) + '</a>'
								)
								$('#send-title').text(messages.title['success'])
							} else {
								$('#status-screen span').html(messages.error['broadcast-failed'])
								$('#send-title').text(messages.title['failed'])
								$('#status-screen .extra-info').html(
									'<div class="mt-3"><textarea class="form-control" readonly cols="30" rows="10">' + escHtml(data.error.message) + '</textarea></div>'
								)
							}
							resetTxForm()
						})

						$('#send-cancel').addClass('d-none')
						$('#send-confirm').addClass('d-none')
						$('#send-close-footer').removeClass('d-none disabled')

					}).catch(function() {
						showSendError(messages.error['bad-utxo'])
					})
				}

				// Use cached UTXOs if available; otherwise re-fetch from backend
				if (globalData.utxos.length > 0) {
					doSend(globalData.utxos)
				} else {
					fetch(getBackend() + '/unspent/' + address + '?confirmed=true')
					.then(function(r) { return r.json() })
					.then(function(data) {
						var utxos = (data && data.error === null) ? data.result : []
						var h     = globalData.height
						utxos.forEach(function(u) {
							u.mature     = isUtxoMature(u, h)
							u.blocksLeft = blocksToMature(u, h)
						})
						globalData.utxos = utxos
						doSend(utxos)
					})
					.catch(function() { showSendError(messages.error['not-enough-utxo']) })
				}
			}

			// ================================================================
			// Script / address helpers
			// ================================================================
			function getScriptType(script) {
				if (script[0] == bitcoin.opcodes.OP_0 && script[1] == 20) return 'bech32'
				if (script[0] == bitcoin.opcodes.OP_HASH160 && script[1] == 20) return 'segwit'
				if (script[0] == bitcoin.opcodes.OP_DUP && script[1] == bitcoin.opcodes.OP_HASH160 && script[2] == 20) return 'legacy'
				return undefined
			}

			function getP2SHScript(redeem) {
				return bitcoin.payments.p2sh({ 'redeem': redeem, 'network': getConfig()['network'] })
			}

			function getP2WPKHScript(pubkey) {
				return bitcoin.payments.p2wpkh({ 'pubkey': pubkey, 'network': getConfig()['network'] })
			}

			function getAddress(keys) {
				var network = getConfig()['network']
				if (getAddressType() == 'bech32') {
					return bitcoin.payments.p2wpkh({ 'pubkey': keys.publicKey, 'network': network }).address
				} else if (getAddressType() == 'segwit') {
					return bitcoin.payments.p2sh({ 'redeem': getP2WPKHScript(keys.publicKey), 'network': network }).address
				} else {
					return bitcoin.payments.p2pkh({ 'pubkey': keys.publicKey, 'network': network }).address
				}
			}

			function validateAddress(address) {
				var network = getConfig()['network']
				try { bitcoin.address.fromBase58Check(address, network); return true } catch(e) {}
				try { bitcoin.address.fromBech32(address, network); return true } catch(e) {}
				return false
			}

			// ================================================================
			// Scan helpers
			// ================================================================
			function stopStream() {
				if (stream != undefined) stream.getTracks().forEach(function(t) { t.stop() })
			}

			function startStream() {
				var canvasElement = document.getElementById('scan-canvas')
				var canvas = canvasElement.getContext('2d')
				var video  = document.createElement('video')
				canvasElement.hidden = true
				$('#loading-message').text(getText('webcam-message')).removeClass('d-none')

				navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }).then(function(gstream) {
					stream = gstream
					video.srcObject = stream
					video.setAttribute('playsinline', true)
					video.play()
					requestAnimationFrame(tick)
				})

				function tick() {
					$('#loading-message').text(getText('webcam-loading'))
					var stop = false
					if (video.readyState === video.HAVE_ENOUGH_DATA) {
						$('#loading-message').addClass('d-none')
						canvasElement.hidden = false
						canvasElement.height = video.videoHeight
						canvasElement.width  = video.videoWidth
						canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height)
						var imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height)
						var code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'dontInvert' })
						if (code) {
							var address = code.data
							if (address.startsWith(getConfig()['uri'])) address = address.replace(getConfig()['uri'], '')
							if (validateAddress(address)) {
								if ($('#send-outputs input[name="send-address"]').last().val() != '') $('#add-output').click()
								$('#send-outputs input[name="send-address"]').last().val(address)
								showMessage(messages.misc.outputAdded(address))
								stop = true
							}
						}
					}
					if (!stop) requestAnimationFrame(tick)
					else { $('#scan-modal').modal('toggle'); stopStream() }
				}
			}

			function showScanModal() {
				$('#scan-modal').modal('toggle')
				startStream()
			}

				$('.send-additional-output').remove()
				$('#wallet-send input').val('')
				globalData.resetTx()
			}

				// PIN modal — confirm button (validates before closing)
				$('#pin-confirm').click(function() {
					var pin = $('#pin-input').val()
					if (_pinResolve) {
						if (_pinValidator) {

							if (err) {
								$('#pin-error').text(err).removeClass('d-none')
								$('#pin-input').focus()
								return
							}
						}
						$('#pin-error').addClass('d-none')
						var pinValue = pin
						$('#pin-input').val('')
						$('#pin-modal').modal('hide')
						var resolve = _pinResolve
						_pinResolve   = null
						_pinValidator = null
						resolve(pinValue)
					}
				})
				$('#pin-cancel').click(function() {
					$('#pin-input').val('')
					if (_pinResolve) { _pinResolve(null); _pinResolve = null; _pinValidator = null }
				})
				$('#pin-input').on('keydown', function(e) {
					if (e.key === 'Enter') $('#pin-confirm').click()
				})

				// PIN login block — main open button
				function doPinLogin() {
					var pin = $('#pin-login-input').val()
					if (!pin) {
						$('#pin-login-error').text(getText('pin-login-error')).removeClass('d-none')
						return
					}
					$('#pin-login-btn').prop('disabled', true).text(getText('loading'))
					loadCredentials(pin).then(function(creds) {
						$('#pin-login-btn').prop('disabled', false).text(getText('pin-login-btn'))
						if (!creds) {
							$('#pin-login-error').text(getText('pin-login-error')).removeClass('d-none')
							$('#pin-login-input').val('').focus()
							return
						}
						$('#pin-login-error').addClass('d-none')
						$('#pin-login-input').val('')
						if (!openFromCredentials(creds)) {
							showMessage(getText('wallet-corrupted'))
							forgetSavedWallet()
						}
					}).catch(function() {
						$('#pin-login-btn').prop('disabled', false).text(getText('pin-login-btn'))
						$('#pin-login-error').text(getText('pin-login-error')).removeClass('d-none')
					})
				}

				$('#pin-login-btn').click(doPinLogin)

				// Send button
				$('#send-tx').click(function() {
					var error = false
					var txFee = ($('#send-fee').val() != '') ? $('#send-fee').val() : globalData.rfee
					var total = 0

					if (isNaN(txFee) || txFee <= 0) {
						showSendError(messages.error['not-valid-fee']); error = true
					} else if (txFee < getConfig()['fee']) {
						showSendError(messages.error['small-fee']); error = true
					}

					$.each($('#send-outputs .send-outputs-item'), function(key, item) {
						var address = $('[name="send-address"]', item).val().trim()
						var amount  = $('[name="send-ammount"]', item).val()
						if (isNaN(amount) || amount <= 0) { showSendError(messages.error['not-valid-amount']); error = true }
						if (!validateAddress(address))    { showSendError(messages.error['not-valid-address']); error = true }
						total += amount * 1
					})

					total = parseFloat((total + txFee * 1).toFixed(getConfig()['decimals']))
					// spendable = total balance minus immature coinbase
					var spendable = amountFormat(globalData.balance - globalData.immatureBalance)
					if (!error) {
						if (total <= spendable) showConfirmation(total)
						else showSendError(messages.error['not-enough-funds'])
					}
				})

				// Open by WIF
				$('#open-key-form').submit(function(e) {
					var wif = $('#passphrase').val().trim()
					if ([51, 52].includes(wif.length)) {
						try {
							globalData.keys = bitcoin.ECPair.fromWIF(wif, getConfig()['network'])
							$('#passphrase').val('')
							openWallet(globalData.keys, true)  // offer PIN save — same as regular form
						} catch(err) {
							showMessage(messages.error['bad-priv-key'])
						}
					} else {
						showMessage(messages.error['bad-priv-key'])
					}
					e.preventDefault()
				})

				// Open by identity+password (email or any text)
				$('#open-regular-form').submit(function(e) {
					var identity    = $('#open-email').val().trim()
					var pass        = $('#open-password').val()
					var passConfirm = $('#open-password-confirm').val()
					if (identity.length >= 3) {
						if (pass.length >= 10) {
							if (pass == passConfirm) {
								var s = identity.toLowerCase()
								s += '|' + pass + '|'
								s += s.length + '|!@' + ((pass.length * 7) + identity.length) * 7
								var regchars   = (pass.match(/[a-z]+/g)) ? pass.match(/[a-z]+/g).length   : 1
								var regupchars = (pass.match(/[A-Z]+/g)) ? pass.match(/[A-Z]+/g).length   : 1
								var regnums    = (pass.match(/[0-9]+/g)) ? pass.match(/[0-9]+/g).length   : 1
								s += ((regnums + regchars) + regupchars) * pass.length + '3571'
								s += (s + '' + s)
								for (var i = 0; i <= 51; i++) s = sha256.update(s).hex()
								$('#open-email').val('')
								$('#open-password').val('')
								$('#open-password-confirm').val('')
								globalData.keys = bitcoin.ECPair.fromPrivateKey(
									bitcoin.Buffer.from(s, 'hex'),
									{ 'network': getConfig()['network'] }
								)
								openWallet(globalData.keys, true)  // offerPin=true
							} else { showMessage(messages.error['pass-not-match']) }
						} else { showMessage(messages.error['pass-too-short']) }
					} else { showMessage(getText('identity-too-short')) }
					e.preventDefault()
				})

						})
					} else {
						globalData.selectedUtxos = null
					}
					renderCoinControl()
				})

				// Select all mature
				$('#coin-control-select-all').click(function(e) {
					if (!globalData.coinControl) return e.preventDefault()
					globalData.selectedUtxos = new Set()
					globalData.utxos.forEach(function(u) {
						if (u.mature) globalData.selectedUtxos.add(u.txid + ':' + u.index)
					})
					renderCoinControl()
					e.preventDefault()
				})

				// Individual UTXO checkbox
				$(document).on('change', '.cc-utxo-check', function() {
					if (!globalData.coinControl || !globalData.selectedUtxos) return
					var key = $(this).data('key')
					if ($(this).is(':checked')) globalData.selectedUtxos.add(key)
					else globalData.selectedUtxos.delete(key)
					_updateCoinControlInfo()
				})

				$('#footer-broadcast').click(function() {
					var rawtx = $('#transaction-broadcast-raw')
					transactionBroadcast(rawtx.val()).then(function(data) {
						if (data.error == null) {
							showMessage(messages.tx['success'] + '<a href="' + escHtml(blockExplorer.tx(data.result)) + '" target="_blank" rel="noopener noreferrer">' + escHtml(data.result) + '</a>')
						} else {
							showMessage(messages.error['broadcast-failed'])
						}
					})
					rawtx.val('')
				})

				$('#address-type-select select').on('change', function() {
					var newType = $(this).val();
					switchAddressType(newType);
					showMessage(messages.settings.typeSwitched(newType));
					
					if (!globalData.keys) return;
					
					// Discard UTXOs and cache for the old address
					if (globalData.address) clearUtxoCache(globalData.address);
					globalData.utxos = [];
					globalData.coinControl = false;
					globalData.selectedUtxos = null;
					globalData.immatureBalance = 0;
					globalData._lastRendered = { balance: -1, immature: -1, utxoFingerprint: '' };
					globalData._lastUpdateAddress = null;
					
					// Compute new address and scripts for the selected type
					globalData.address   = getAddress(globalData.keys);
					globalData.scriptHex = getScriptHex(globalData.keys);
					globalData.allScriptHexes = getAllScriptHexes(globalData.keys);
					globalData.allAddresses   = getAllAddresses(globalData.keys);
					
					// Update the UI
					$('#wallet-address').text(globalData.address);
					showQrAddress(getConfig()['uri'] + globalData.address);
					$('#wallet-keys-pubkey input').val(globalData.pubKeyHex);
					// Reset privkey canvas to masked — user must click Show again
					_privkeyClear('wallet-privkey-canvas');
					_privkeyMask('wallet-privkey-canvas');
					$('#wallet-privkey-copy-btn').addClass('d-none');
					$('#toggle-wallet-privkey').text(getText('show'));
					$('#wallet-keys-script input').val('0014' + bitcoin.Buffer.from(getP2WPKHScript(globalData.keys.publicKey).hash).toString('hex'));
					
					// Fetch UTXOs and balance for the new address – Coin Control now shows only those UTXOs
					walletBalance();
					setHomeTitle();
				});

				$('#wallet-backend button').click(function() {
					switchBackend($('#wallet-backend input').val())
				})

				$('#wallet-language-select select').on('change', function() {
					setCookie('language', $('#wallet-language-select select').val(), 60)
					initLang()
					// Re-render dynamic content that uses getText but is NOT covered by [tkey] scan:
					//   - Coin control panel rows (use getText for status labels)
					//   - Wallet history rows (use getText for direction/badge labels)
					//   - send-fee placeholder (set in openWallet, re-applied via openWallet below)
					//   - messages object (already updated inside initLang via initMessages())
					if (globalData.keys) {
						// openWallet re-applies all getText-based placeholders and titles
						openWallet(globalData.keys, false)
						// Re-render coin control if panel is visible
						if (!$('#coin-control-panel').hasClass('d-none')) renderCoinControl()
						// Re-render history (uses getText for conf labels, direction labels)
						updateHistory()
					}
				})

				estimateFee().then(function(data) {
					if (data.error == null) globalData.rfee = amountFormat(data.result.feerate)
					else globalData.rfee = getConfig()['fee']
				})

				$('#scan-modal').on('hide.bs.modal', function() { stopStream() })

				// Copy address to clipboard
				$('#copy-address-btn').click(function() {
					if (globalData.address) copyToClipboard(globalData.address, $(this))
				})
			})
		</script>
	</body>
</html>
